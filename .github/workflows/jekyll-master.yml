name: Deploy Master Branch

on:
  push:
    branches:
      - master

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v1
    - name: Build the site in the jekyll/builder container
      run: |
        docker run \
        -v ${{ github.workspace }}:/srv/jekyll -v ${{ github.workspace }}/_site:/srv/jekyll/_site \
        jekyll/jekyll:latest /bin/bash -c "chmod 777 /srv/jekyll -R && jekyll build --future"
    - name: Upload
      run: |
        mkdir -p "$HOME/.ssh"
        echo "${{ secrets.KEY }}" > "$HOME/.ssh/key"
        chmod 600 "$HOME/.ssh/key"
        rsync -rILvh -e "ssh -i $HOME/.ssh/key -o StrictHostKeyChecking=no" $GITHUB_WORKSPACE/_site/ "${{ secrets.USERNAME }}@bots.delta.chat:"
